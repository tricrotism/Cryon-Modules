# Crowdin config for all Cryon feature modules in this repo.
#
# The glob picks up every module's lang/en_US.properties; translations land beside each source and are
# auto-registered at runtime by LangScanner. `preserve_hierarchy` keeps the per-module folder structure
# in Crowdin so the identically-named en_US.properties files don't collide. Add nothing when you add a
# module — the glob already covers it. Credentials come from env — see TRANSLATING.md.
project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_PERSONAL_TOKEN
preserve_hierarchy: true

files:
  - source: /**/src/main/resources/lang/en_US.properties
    translation: /**/src/main/resources/lang/%locale_with_underscore%.properties
